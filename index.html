<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump & Solve</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game-container">

    <!-- MENU UTAMA -->
    <div id="main-menu">

        <h1>🚀 JUMP & SOLVE</h1>

        <p>Permainan Matematik Interaktif</p>

        <button id="start-btn">
            MULA BERMAIN
        </button>

        <button id="instruction-btn">
            CARA BERMAIN
        </button>

    </div>


    <!-- INFO GAME -->
    <div id="hud" class="hidden">

        <div>
            ❤️ <span id="lives">3</span>
        </div>

        <div>
            ⭐ Skor:
            <span id="score">0</span>
        </div>

        <div>
            🪙 Syiling:
            <span id="coins">0</span>
        </div>

    </div>


    <!-- SOALAN MATEMATIK -->

    <div id="question-box" class="hidden">

        <h2 id="question">
            2 + 3 = ?
        </h2>


        <div id="answers">

            <button class="answer">
                4
            </button>

            <button class="answer">
                5
            </button>

            <button class="answer">
                6
            </button>

        </div>

    </div>


    <!-- RUANG PERMAINAN -->

    <canvas id="gameCanvas">

    </canvas>


    <!-- PAPARAN TAMAT -->

    <div id="game-over" class="hidden">

        <h2>Permainan Tamat</h2>

        <p>
            Skor Akhir:
            <span id="final-score">
            0
            </span>
        </p>


        <button id="restart-btn">
            Main Semula
        </button>

    </div>


</div>


<script src="questions.js"></script>
<script src="levels.js"></script>
<script src="level1.js"></script>
<script src="script.js"></script>


</body>
</html>
