<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JUMP & SOLVE</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="game-container">


<!-- MENU UTAMA -->

<div id="main-menu">

<h1>🚀 JUMP & SOLVE</h1>

<p>Pengembaraan Matematik Interaktif</p>


<button id="start-btn">
MULA BERMAIN
</button>


</div>



<!-- HUD -->

<div id="hud" class="hidden">


<div>
❤️ <span id="lives">3</span>
</div>


<div>
⭐ <span id="score">0</span>
</div>


<div>
🪙 <span id="coins">0</span>
</div>


<div>
🏰 Level 1
</div>


</div>



<!-- SOALAN -->

<div id="question-box" class="hidden">


<h2 id="question">
Soalan
</h2>


<div id="answers">


<button class="answer">
A
</button>


<button class="answer">
B
</button>


<button class="answer">
C
</button>


</div>


</div>




<!-- CANVAS GAME -->

<canvas id="gameCanvas"></canvas>





<!-- TAMAT LEVEL -->

<div id="level-complete" class="hidden">


<h2>
🎉 Level Selesai!
</h2>


<p>
Skor:
<span id="complete-score">
0
</span>
</p>


<button id="next-btn">
Main Lagi
</button>


</div>




<!-- GAME OVER -->


<div id="game-over" class="hidden">


<h2>
Game Over
</h2>


<p>
Skor Akhir:
<span id="final-score">
0
</span>
</p>


<button id="restart-btn">
Cuba Lagi
</button>


</div>



</div>





<!-- FAIL GAME -->

<script src="questions.js"></script>

<script src="levels.js"></script>

<script src="level1.js"></script>

<script src="script.js"></script>



</body>

</html>
